on: [push]

name: PACT and iLEAP CI & CD

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    name: Rust projects
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Cache target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: CI
        run: |
          cargo build
          cargo test
          cargo fmt --check
          cargo clippy -- -Dwarnings
      - name: SQLITE3 Smoke Test
        working-directory: ileap-data-model/sql-example
        run: |
          sqlite3 < ileap.sql

  demo_api_deployment:
    runs-on: ubuntu-latest
    name: Deploy demo API
    if: github.ref == 'refs/heads/main'
    needs: build_and_test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
      - run: flyctl deploy --remote-only --config demo-api/fly.production.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  demo_preview_api_deployment:
    runs-on: ubuntu-latest
    name: Deploy preview demo API
    if: github.ref == 'refs/heads/preview'
    needs: build_and_test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6
      - run: flyctl deploy --remote-only --config demo-api/fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
